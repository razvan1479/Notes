# Publica automat un update la fiecare push pe main.
# Creste singur versiunea (1.0.<numarul rularii>), compileaza, SEMNEAZA
# si publica un GitHub Release cu installer-ul + latest.json.
# Tu doar dai push din VS Code; aplicatia va gasi singura update-ul.

name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust (accelereaza rularile urmatoare)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Seteaza versiunea automat (1.0.<run_number>)
        shell: bash
        env:
          VERSION: 1.0.${{ github.run_number }}
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p));c.version=process.env.VERSION;fs.writeFileSync(p,JSON.stringify(c,null,2));console.log('Versiune setata la',c.version)"

      - name: Instaleaza dependentele frontend
        run: npm install

      - name: Build + semnare + publicare Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: "QuickTasks v__VERSION__"
          releaseBody: "Versiune noua. Deschide aplicatia — te anunta singura ca exista update."
          releaseDraft: false
          prerelease: false
