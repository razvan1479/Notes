# Publica un update instalabil din aplicatie.
# Se declanseaza cand dai push la un tag de forma v* (ex. v1.0.1).
# Compileaza, SEMNEAZA update-ul cu cheia privata (secret) si creeaza
# un GitHub Release cu installer-ul + latest.json (folosit de updater).

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust (accelereaza rularile urmatoare)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Instaleaza dependentele frontend
        run: npm install

      - name: Build + semnare + publicare Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QuickTasks ${{ github.ref_name }}"
          releaseBody: "Versiune noua. Deschide aplicatia si apasa Verifica update."
          releaseDraft: false
          prerelease: false
