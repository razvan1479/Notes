# Publica un release cu versiunea luata din MESAJUL DE COMMIT.
# Pune in mesaj un marcaj de forma vX.Y.Z (ex: "am adaugat calendar v6.2.0").
# - daca gaseste vX.Y.Z si tag-ul nu exista deja -> compileaza, semneaza, publica
# - daca nu gaseste vX.Y.Z in mesaj -> nu publica nimic (push normal)
# - daca versiunea a mai fost publicata -> nu republica

name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ia versiunea din mesajul de commit
        id: ver
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Mesaj commit: $MSG"
          VERSION=$(echo "$MSG" | grep -oiE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 | sed 's/^[vV]//')

          if [ -z "$VERSION" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Niciun vX.Y.Z in mesaj — nu publicam."
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Versiunea v$VERSION exista deja — nu republicam."
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Scriem versiunea in config, ca sa fie folosita la build si in aplicatie.
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p));c.version='$VERSION';fs.writeFileSync(p,JSON.stringify(c,null,2));console.log('Versiune setata la',c.version)"

      - name: Setup Rust
        if: steps.ver.outputs.publish == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        if: steps.ver.outputs.publish == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Instaleaza dependentele frontend
        if: steps.ver.outputs.publish == 'true'
        run: npm install

      - name: Build + semnare + publicare Release
        if: steps.ver.outputs.publish == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: "QuickTasks v__VERSION__"
          releaseBody: "Versiune noua. Deschide aplicatia — te anunta singura ca exista update."
          releaseDraft: false
          prerelease: false
