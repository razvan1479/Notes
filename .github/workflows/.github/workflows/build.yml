name: Build Windows

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instaleaza dependentele frontend
        run: npm install

      - name: Build aplicatie (Tauri)
        run: npm run tauri:build

      - name: Urca exe-ul portabil
        uses: actions/upload-artifact@v4
        with:
          name: QuickTasks-portable
          path: src-tauri/target/release/QuickTasks.exe

      - name: Urca instalatorul
        uses: actions/upload-artifact@v4
        with:
          name: QuickTasks-installer
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
