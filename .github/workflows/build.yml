# Compileaza aplicatia pe un server Windows de la GitHub (gratuit).
# Nu ai nevoie de Rust/Node/Visual Studio pe laptopul tau.
# Rezultatul (exe portabil + instalator) apare la sectiunea "Artifacts".

name: Build Windows

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}   # permite pornirea manuala din tab-ul Actions

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust (accelereaza rularile urmatoare)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Instaleaza dependentele frontend
        run: npm install

      - name: Build aplicatie (Tauri)
        run: npm run tauri:build

      - name: Urca exe-ul portabil
        uses: actions/upload-artifact@v4
        with:
          name: QuickTasks-portable
          path: src-tauri/target/release/QuickTasks.exe

      - name: Urca instalatorul
        uses: actions/upload-artifact@v4
        with:
          name: QuickTasks-installer
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
