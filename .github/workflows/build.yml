# Build manual (optional). Produce exe portabil + installer ca "Artifacts",
# fara sa creeze un Release. Il pornesti manual din tab-ul Actions daca vrei.
# Pentru update-uri automate NU e nevoie de el; se ocupa release.yml.

name: Build Windows (manual)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Instaleaza dependentele frontend
        run: npm install

      - name: Build aplicatie (Tauri)
        run: npm run tauri:build

      - name: Urca exe-ul portabil
        uses: actions/upload-artifact@v4
        with:
          name: QuickTasks-portable
          path: src-tauri/target/release/QuickTasks.exe

      - name: Urca instalatorul
        uses: actions/upload-artifact@v4
        with:
          name: QuickTasks-installer
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
